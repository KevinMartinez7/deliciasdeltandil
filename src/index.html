<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Delicias del Tandil - Catering de Eventos</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Catering y organización de eventos en Tandil. Servicio de alta calidad para bodas, cumpleaños, fiestas y celebraciones especiales.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    // Scroll reveal animation - Estilo Squarespace
    document.addEventListener('DOMContentLoaded', function() {
      const observerOptions = {
        threshold: 0.15,
        rootMargin: '0px 0px -50px 0px'
      };
      
      const observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
          }
        });
      }, observerOptions);
      
      // Observar todos los elementos con clase scroll-reveal
      setTimeout(function() {
        const elements = document.querySelectorAll('.scroll-reveal');
        elements.forEach(function(el) {
          observer.observe(el);
        });
      }, 100);
      
      // Re-observar cuando Angular carga nuevos componentes
      const mutationObserver = new MutationObserver(function() {
        const newElements = document.querySelectorAll('.scroll-reveal:not(.revealed)');
        newElements.forEach(function(el) {
          if (!el.classList.contains('observed')) {
            el.classList.add('observed');
            observer.observe(el);
          }
        });
      });
      
      mutationObserver.observe(document.body, {
        childList: true,
        subtree: true
      });
    });
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
